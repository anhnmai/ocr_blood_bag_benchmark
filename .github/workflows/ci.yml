name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y tesseract-ocr tesseract-ocr-deu libzbar0

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          # Install lightweight subset for CI (no GPU engines)
          pip install \
            numpy Pillow opencv-python-headless pyyaml tqdm \
            pyzbar editdistance jiwer pandas lxml \
            pytesseract pytest

      - name: Install package in editable mode
        run: pip install -e .

      - name: Run unit tests
        run: pytest tests/ -v --tb=short

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff
      - name: Lint
        run: ruff check src/ tests/ --select E,F,W --ignore E501
